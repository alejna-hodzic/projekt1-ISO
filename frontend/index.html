<!DOCTYPE html>
<html>
    <head>
        <title>Todo app</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="ui fluid container" id="top-bar">
            <h2 class="ui header" id="app-title">Todo app</h2>
            <div id="user-hash-show" data-content="Save this code and use it to reload your tasks later on this or another device!"></div>
            <div id="reload-container">
                <p>
                    <u>Been here before?</u>
                </p>
                <button class="ui circular secondary button" id="reload-tasks-btn">
                    Reload Your tasks
                </button>
            </div>
        </div>

        <div class="ui fluid container" style="padding: 0 20px">
            <div class="ui cards" id="lists-container"></div>
        </div>

        <button class="ui circular massive icon button" id="fab-add-btn">
            <i class="plus icon"></i>
        </button>

        <div class="ui mini modal" id="create-task-list-modal">
            <div class="header" style="border: none;">Create new list</div>
            <div class="content">
                <div class="ui fluid input">
                    <input type="text" id="new-list-input" placeholder="Enter name of the list">
                </div>
            </div>

            <div class="actions modal-actions">
                <div class="ui cancel button cancel-btn">Cancel</div>
                <div class="ui approve button done-btn" id="done-btn">Done</div>
            </div>
        </div>

        <div class="ui mini modal" id="create-task-modal">
            <div class="header" style="border: none;">Add new task</div>
            <div class="content">
                <div class="ui form">
                    <div class="field">
                        <label>Task</label>
                        <input type="text" id="task-input" placeholder="Add your task description here!">
                    </div>
                    <div class="field">
                        <label>Priority</label>
                        <select class="ui dropdown" id="task-priority">
                            <option value="1" selected>Highest Priority</option>
                            <option value="2">High Priority</option>
                            <option value="3">Medium Priority</option>
                            <option value="4">Low Priority</option>
                            <option value="5">Lowest Priority</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="actions modal-actions">
                <div class="ui cancel button cancel-btn">Cancel</div>
                <div class="ui approve button done-btn" id="done-task-btn">Add</div>
            </div>
        </div>

        <div class="ui mini modal" id="confirm-delete-modal">
            <div class="header" style="border: none;">Confirm Deletion</div>
                <div class="content">
                    <p id="delete-message">Are you sure you want to delete this?</p>
                </div>
                <div class="actions modal-actions">
                <div class="ui cancel button cancel-btn">Cancel</div>
                <div class="ui approve button confirm-delete-btn">Delete</div>
            </div>
        </div>

        <div class="ui mini modal" id="reload-session-modal">
            <div class="header" style="border: none;">Load Your tasks</div>
            <div class="content">
                <p>Enter your previously saved session code to restore your tasks:</p>
                <div class="ui fluid input">
                    <input type="text" id="session-hash-input" placeholder="e.g. user_171..._abc123">
                </div>
            </div>
            <div class="actions modal-actions">
                <div class="ui cancel button cancel-btn">Cancel</div>
                <div class="ui approve button done-btn" id="load-session-btn">Load</div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Todo app</title>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="ui fluid container" id="top-bar">
            <h2 class="ui header" id="app-title">Todo app</h2>
            <div id="reload-container">
                <p>
                    <u>Been here before?</u>
                </p>
                <button class="ui circular secondary button" id="reload-tasks-btn">
                    Reload Your tasks
                </button>
            </div>
        </div>

        <div class="ui fluid container" style="padding: 0 20px">
            <div class="ui cards" id="lists-container"></div>
        </div>

        <button class="ui circular massive icon button" id="fab-add-btn">
            <i class="plus icon"></i>
        </button>

        <div class="ui mini modal" id="create-task-list-modal">
            <div class="header" style="border: none;">Create new list</div>
            <div class="content">
                <div class="ui fluid input">
                    <input type="text" id="new-list-input" placeholder="Enter name of the list">
                </div>
            </div>
            <div class="actions modal-actions">
                <div class="ui cancel button cancel-btn">Cancel</div>
                <div class="ui approve button done-btn">Done</div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.4/dist/semantic.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
